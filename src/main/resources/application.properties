spring.application.name=AppApplication.java
# ==================== DATASOURCE ====================
spring.datasource.url=jdbc:mysql://localhost:3306/academia?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=alvaro
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Pool de conexiones (HikariCP - por defecto en Spring Boot)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.max-lifetime=600000

# ==================== JPA / HIBERNATE ====================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

